version: '3.8'

services:
  # ============================================
  # Nginx - Serveur Web
  # ============================================
  nginx:
    image: nginx:1.25-alpine
    container_name: talchif_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./public:/app/public:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      php:
        condition: service_healthy
    networks:
      - talchif
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # PHP-FPM - Application
  # ============================================
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: talchif_php
    restart: unless-stopped
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: postgresql://${DB_USER:-app}:${DB_PASSWORD:-!ChangeMe!}@postgres:5432/${DB_NAME:-talchif}?serverVersion=16&charset=utf8
      REDIS_URL: redis://redis:6379
      MESSENGER_TRANSPORT_DSN: doctrine://default
      MAILER_DSN: ${MAILER_DSN:-null://null}
      
      # Configuration métier
      APP_COMMISSION_TAUX: 0.10
      APP_COMMANDE_EXPIRATION_MINUTES: 10
      APP_ANTIFRAUDE_TENTATIVES_MAX: 3
      APP_MOMO_NUMERO: "63519678"
      APP_MOMO_BENEFICIAIRE: "TALCHIF"
    volumes:
      - ./var:/app/var
      - ./public/images:/app/public/images
      - php_logs:/app/var/log
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - talchif
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # PostgreSQL - Base de données
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: talchif_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-talchif}
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-!ChangeMe!}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=fr_FR.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - talchif
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-app} -d ${DB_NAME:-talchif}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    shm_size: 256mb

  # ============================================
  # Redis - Cache et Sessions
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: talchif_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - talchif
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ============================================
  # Messenger Worker - Queue asynchrone
  # ============================================
  messenger_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: talchif_messenger
    restart: unless-stopped
    command: php bin/console messenger:consume async --time-limit=3600 --memory-limit=256M
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: postgresql://${DB_USER:-app}:${DB_PASSWORD:-!ChangeMe!}@postgres:5432/${DB_NAME:-talchif}?serverVersion=16&charset=utf8
      REDIS_URL: redis://redis:6379
    volumes:
      - ./var:/app/var
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - talchif
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ============================================
  # Cron - Tâches planifiées
  # ============================================
  cron:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: talchif_cron
    restart: unless-stopped
    command: >
      sh -c "echo '*/5 * * * * php /app/bin/console app:commande:expirer >> /app/var/log/cron.log 2>&1' | crontab - && crond -f -l 2"
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: postgresql://${DB_USER:-app}:${DB_PASSWORD:-!ChangeMe!}@postgres:5432/${DB_NAME:-talchif}?serverVersion=16&charset=utf8
    volumes:
      - ./var:/app/var
    depends_on:
      - postgres
    networks:
      - talchif

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local
  php_logs:
    driver: local

# ============================================
# Networks
# ============================================
networks:
  talchif:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
